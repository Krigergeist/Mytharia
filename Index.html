<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Add-on Concept Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom Scrollbar for dark theme */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1f2937;
      }
      ::-webkit-scrollbar-thumb {
        background: #4b5563;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }
      .folder-toggle::before {
        content: "▶";
        display: inline-block;
        margin-right: 6px;
        font-size: 0.75rem;
        transition: transform 0.2s;
      }
      .folder-open > .folder-toggle::before {
        transform: rotate(90deg);
      }
    </style>
  </head>
  <body
    class="bg-gray-900 text-gray-200 h-screen flex overflow-hidden font-sans"
  >
    <!-- Sidebar / File Explorer -->
    <aside
      class="w-80 bg-gray-900 border-r border-gray-700 flex flex-col h-full shadow-xl z-10"
    >
      <div class="p-4 border-b border-gray-700 bg-gray-800">
        <h1 class="text-lg font-bold text-white flex items-center gap-2">
          <svg
            class="w-5 h-5 text-blue-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"
            ></path>
          </svg>
          Project Explorer
        </h1>
        <p class="text-xs text-gray-400 mt-1">Add-on Concept Structure</p>
      </div>
      <div class="flex-1 overflow-y-auto p-2" id="file-tree">
        <!-- Tree will be rendered here by JS -->
      </div>
    </aside>

    <!-- Main Content / Viewer -->
    <main class="flex-1 flex flex-col h-full bg-gray-950">
      <header
        class="p-4 border-b border-gray-800 bg-gray-900 flex items-center justify-between"
      >
        <div class="flex items-center gap-2">
          <svg
            class="w-5 h-5 text-gray-500"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            ></path>
          </svg>
          <h2 id="file-title" class="text-sm font-mono text-gray-300">
            Pilih file untuk melihat pratinjau
          </h2>
        </div>
      </header>

      <div class="flex-1 overflow-y-auto p-6" id="file-viewer">
        <div
          class="h-full flex flex-col items-center justify-center text-gray-500 space-y-4"
        >
          <svg
            class="w-16 h-16 opacity-20"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
            ></path>
          </svg>
          <p>
            Jelajahi struktur di sidebar dan klik file untuk melihat isinya.
          </p>
        </div>
      </div>
    </main>

    <script>
      // Data Struktur Folder dan File
      const fileStructure = [
        { name: "Add-on Description.pdf", type: "file", ext: "pdf" },
        { name: "Index.html", type: "file", ext: "html" },
        {
          name: "bbmodel collection",
          type: "folder",
          children: [
            {
              name: "bbmodel",
              type: "folder",
              children: [
                {
                  name: "greenveil_grass.bbmodel",
                  type: "file",
                  ext: "bbmodel",
                },
              ],
            },
            {
              name: "png",
              type: "folder",
              children: [
                { name: "greenveil_grass.png", type: "file", ext: "png" },
              ],
            },
          ],
        },
        {
          name: "Biome Concept",
          type: "folder",
          children: [
            { name: "Biome - Name.txt", type: "file", ext: "txt" },
            {
              name: "Biome - Description",
              type: "folder",
              children: [
                {
                  name: "Surface",
                  type: "folder",
                  children: [
                    { name: "Desert Biome", type: "folder", children: [] },
                    {
                      name: "Forest Biome",
                      type: "folder",
                      children: [
                        {
                          name: "Ashveil Forest",
                          type: "folder",
                          children: [
                            {
                              name: "Ashveil Forest.png",
                              type: "file",
                              ext: "png",
                            },
                            {
                              name: "Ashveil Forest.txt",
                              type: "file",
                              ext: "txt",
                            },
                          ],
                        },
                        {
                          name: "Elarion Forest",
                          type: "folder",
                          children: [
                            {
                              name: "Elarion Forest.png",
                              type: "file",
                              ext: "png",
                            },
                            {
                              name: "Elarion Forest.txt",
                              type: "file",
                              ext: "txt",
                            },
                          ],
                        },
                        {
                          name: "Greenveil Basin",
                          type: "folder",
                          children: [
                            {
                              name: "Greenveil Basin.png",
                              type: "file",
                              ext: "png",
                            },
                            {
                              name: "Greenveil Basin.txt",
                              type: "file",
                              ext: "txt",
                            },
                            {
                              name: "Greenveil Grass.png",
                              type: "file",
                              ext: "png",
                            },
                          ],
                        },
                        {
                          name: "Lumira Grove",
                          type: "folder",
                          children: [
                            {
                              name: "Lumira Grove.png",
                              type: "file",
                              ext: "png",
                            },
                            {
                              name: "Lumira Grove.txt",
                              type: "file",
                              ext: "txt",
                            },
                          ],
                        },
                        {
                          name: "Verdan Hollow",
                          type: "folder",
                          children: [
                            {
                              name: "Verdan Hollow.png",
                              type: "file",
                              ext: "png",
                            },
                            {
                              name: "Verdan Hollow.txt",
                              type: "file",
                              ext: "txt",
                            },
                          ],
                        },
                        {
                          name: "Whisperroot Woods",
                          type: "folder",
                          children: [
                            {
                              name: "Whisperroot Woods.png",
                              type: "file",
                              ext: "png",
                            },
                            {
                              name: "Whisperroot Woods.txt",
                              type: "file",
                              ext: "txt",
                            },
                          ],
                        },
                      ],
                    },
                    { name: "Meadow Biome", type: "folder", children: [] },
                    { name: "Mountain Biome", type: "folder", children: [] },
                    { name: "Snowy Biome", type: "folder", children: [] },
                  ],
                },
                { name: "Underground", type: "folder", children: [] },
              ],
            },
          ],
        },
        { name: "Lore Concept", type: "folder", children: [] },
        {
          name: "Model Concept",
          type: "folder",
          children: [
            { name: "Block", type: "folder", children: [] },
            { name: "Entity", type: "folder", children: [] },
            { name: "Item", type: "folder", children: [] },
          ],
        },
        { name: "UI Concept", type: "folder", children: [] },
      ];

      const treeContainer = document.getElementById("file-tree");
      const viewerContainer = document.getElementById("file-viewer");
      const titleContainer = document.getElementById("file-title");

      function getIcon(ext) {
        switch (ext) {
          case "png":
            return `<svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`;
          case "txt":
            return `<svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>`;
          case "pdf":
            return `<svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>`;
          case "html":
            return `<svg class="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>`;
          case "bbmodel":
            return `<svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>`;
          default:
            return `<svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>`;
        }
      }

      function renderTree(nodes, parentElement, currentPath = "") {
        const ul = document.createElement("ul");
        ul.className = "pl-4 space-y-1";

        nodes.forEach((node) => {
          const li = document.createElement("li");
          const fullPath = currentPath
            ? `${currentPath}/${node.name}`
            : node.name;

          if (node.type === "folder") {
            const div = document.createElement("div");
            const isExpanded = fullPath.includes("Biome Concept");
            div.className = `flex items-center gap-2 cursor-pointer hover:bg-gray-800 p-1.5 rounded text-sm text-gray-300 font-medium select-none folder-toggle ${isExpanded ? "folder-open" : ""}`;

            div.innerHTML = `
                        <svg class="w-4 h-4 text-yellow-500" viewBox="0 0 20 20" fill="currentColor"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                        <span class="truncate">${node.name}</span>
                    `;

            const childrenContainer = document.createElement("div");
            childrenContainer.className = `overflow-hidden transition-all ${isExpanded ? "block" : "hidden"}`;

            div.onclick = () => {
              div.classList.toggle("folder-open");
              childrenContainer.classList.toggle("hidden");
            };

            li.appendChild(div);
            li.appendChild(childrenContainer);

            if (node.children && node.children.length > 0) {
              renderTree(node.children, childrenContainer, fullPath);
            } else {
              const emptyDiv = document.createElement("div");
              emptyDiv.className = "pl-8 py-1 text-xs text-gray-600 italic";
              emptyDiv.innerText = "(Kosong)";
              childrenContainer.appendChild(emptyDiv);
            }
          } else {
            const div = document.createElement("div");
            div.className =
              "flex items-center gap-2 cursor-pointer hover:bg-gray-700 hover:text-white p-1.5 rounded text-sm text-gray-400 pl-6 select-none transition-colors";
            div.innerHTML = `${getIcon(node.ext)} <span class="truncate">${node.name}</span>`;

            div.onclick = (e) =>
              openFile(node.name, node.ext, fullPath, e.currentTarget);
            li.appendChild(div);
          }
          ul.appendChild(li);
        });
        parentElement.appendChild(ul);
      }

      async function openFile(name, ext, fullPath, element) {
        titleContainer.innerText = fullPath;

        // Highlight active file
        document
          .querySelectorAll("#file-tree div")
          .forEach((el) => el.classList.remove("bg-blue-900", "text-white"));
        if (element) element.classList.add("bg-blue-900", "text-white");

        // --- FITUR BARU: SPLIT VIEW KHUSUS UNTUK BIOME CONCEPT ---
        // Jika file berada di dalam folder Biome Concept dan berupa txt atau png
        if (
          fullPath.includes("Biome Concept") &&
          (ext === "png" || ext === "txt")
        ) {
          // Ambil base path tanpa ekstensi (misal: ".../Ashveil Forest/Ashveil Forest")
          const basePath = fullPath.substring(0, fullPath.lastIndexOf("."));
          const baseName = name.substring(0, name.lastIndexOf("."));

          const imagePath = basePath + ".png";
          const textPath = basePath + ".txt";

          viewerContainer.innerHTML = `
                    <div class="flex flex-col xl:flex-row gap-6 h-full">
                        <!-- Panel Gambar -->
                        <div class="w-full xl:w-1/2 flex-shrink-0 bg-gray-950 border border-gray-800 rounded-lg p-4 flex flex-col items-center justify-center overflow-hidden relative shadow-inner">
                            <div class="absolute top-3 left-3 bg-gray-800/80 text-xs px-3 py-1 rounded-full text-gray-300 backdrop-blur-sm border border-gray-700">Concept Art</div>
                            <img src="${imagePath}" alt="${baseName}" 
                                class="max-w-full max-h-[40vh] xl:max-h-full object-contain rounded-lg drop-shadow-2xl transition-all hover:scale-105" 
                                onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'text-gray-500 flex flex-col items-center justify-center h-full\\'><svg class=\\'w-16 h-16 mb-4 opacity-30\\' fill=\\'none\\' stroke=\\'currentColor\\' viewBox=\\'0 0 24 24\\'><path stroke-linecap=\\'round\\' stroke-linejoin=\\'round\\' stroke-width=\\'1.5\\' d=\\'M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z\\'></path></svg><p>Gambar konsep tidak ditemukan.</p></div>';">
                        </div>

                        <!-- Panel Teks/Deskripsi -->
                        <div class="w-full xl:w-1/2 flex-1 bg-gray-900 border border-gray-700 rounded-lg p-6 shadow-lg flex flex-col h-[50vh] xl:h-auto">
                            <h3 class="text-xl font-bold text-white mb-4 border-b border-gray-700 pb-3 flex items-center gap-2">
                                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                Deskripsi: ${baseName}
                            </h3>
                            <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                                <pre id="text-content" class="font-mono text-sm text-gray-300 whitespace-pre-wrap leading-relaxed animate-pulse">Memuat deskripsi...</pre>
                            </div>
                        </div>
                    </div>
                `;

          // Fetch data text
          const textContentEl = document.getElementById("text-content");
          try {
            const response = await fetch(textPath);
            if (response.ok) {
              const text = await response.text();
              textContentEl.classList.remove("animate-pulse");
              textContentEl.innerText = text;
            } else {
              textContentEl.classList.remove("animate-pulse");
              textContentEl.innerHTML = `<span class="text-gray-500 italic block mt-4 border border-gray-800 p-4 rounded bg-gray-800/50">File deskripsi (${baseName}.txt) tidak ditemukan di direktori ini.</span>`;
            }
          } catch (error) {
            textContentEl.classList.remove("animate-pulse");
            textContentEl.innerHTML = `<span class="text-red-400 block mt-4 p-4 border border-red-900/50 bg-red-900/20 rounded">Gagal memuat teks. Pastikan Anda menjalankan file ini menggunakan <strong>Local Web Server</strong>.</span>`;
          }
          return; // Stop fungsi di sini agar tidak menjalankan render default
        }

        // --- RENDER DEFAULT UNTUK FILE LAIN (Luar Biome) ---
        if (ext === "png") {
          viewerContainer.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center bg-gray-950 p-4 rounded-xl border border-gray-800 shadow-inner">
                        <img src="${fullPath}" alt="${name}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'text-red-400 text-center p-6 bg-red-900/20 border border-red-800 rounded-lg\\'><p>Gambar tidak ditemukan di path: <strong>${fullPath}</strong></p></div>';" class="max-w-full max-h-[80vh] object-contain rounded drop-shadow-2xl">
                    </div>`;
        } else if (ext === "txt") {
          viewerContainer.innerHTML = `<div class="flex items-center justify-center h-full text-blue-400 animate-pulse">Memuat teks...</div>`;
          try {
            const response = await fetch(fullPath);
            if (response.ok) {
              const text = await response.text();
              viewerContainer.innerHTML = `
                            <div class="bg-gray-900 border border-gray-700 rounded-lg p-6 shadow-lg h-full overflow-y-auto">
                                <pre class="font-mono text-sm text-gray-300 whitespace-pre-wrap leading-relaxed">${text}</pre>
                            </div>`;
            } else {
              throw new Error("File tidak ditemukan.");
            }
          } catch (error) {
            viewerContainer.innerHTML = `<div class="bg-red-900/20 border border-red-800 text-red-300 p-6 rounded-lg max-w-2xl mx-auto mt-10"><p>Gagal memuat file. Pastikan menggunakan Local Web Server.</p></div>`;
          }
        } else {
          viewerContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full bg-gray-900 rounded-lg border border-gray-800 text-gray-400">
                        <p>Pratinjau untuk format <strong>.${ext}</strong> belum didukung di penampil web ini.</p>
                    </div>`;
        }
      }

      // Inisialisasi awal
      renderTree(fileStructure, treeContainer);
    </script>
  </body>
</html>
